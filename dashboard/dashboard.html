<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SmartSenseCNC Dashboard | Team Tech Titans</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: 'Inter', -apple-system, sans-serif;
            background: #f5f8fc;
            color: #2c3e50;
            min-height: 100vh;
            padding-bottom: 40px;
        }

        header {
            background: #ffffff;
            border-bottom: 1px solid #dae1e7;
            padding: 16px 32px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        header h5 { color: #7f8c8d; text-transform: uppercase; letter-spacing: 1px; font-size: 0.75rem; }
        header h1 { font-size: 1.75rem; color: #1a252f; font-weight: 700; }
        
        .live-indicator { display: flex; align-items: center; gap: 8px; font-weight: 600; font-size: 0.9rem; }
        .pulse-dot { width: 10px; height: 10px; background: #2ecc71; border-radius: 50%; box-shadow: 0 0 0 0 rgba(46, 204, 113, 0.7); animation: pulse 1.5s infinite; }

        @keyframes pulse {
            0% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(46, 204, 113, 0.7); }
            70% { transform: scale(1); box-shadow: 0 0 0 6px rgba(46, 204, 113, 0); }
            100% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(46, 204, 113, 0); }
        }

        .container { max-width: 1400px; margin: 24px auto; padding: 0 24px; }
        
        .control-panel { background: #ffffff; padding: 16px 24px; border-radius: 12px; border: 1px solid #e2e8f0; margin-bottom: 24px; display: flex; justify-content: space-between; align-items: center; }
        .control-group { display: flex; align-items: center; gap: 12px; }
        select { padding: 8px 16px; border-radius: 6px; border: 1px solid #cbd5e1; font-size: 0.95rem; font-weight: 600; color: #334155; outline: none; }
        
        .btn-refresh { background: #3b82f6; color: white; border: none; padding: 8px 16px; border-radius: 6px; font-weight: 600; cursor: pointer; display: flex; align-items: center; gap: 6px; }
        .btn-refresh:hover { background: #2563eb; }

        .status-banner { background: white; padding: 24px; border-radius: 12px; border: 1px solid #e2e8f0; margin-bottom: 24px; display: flex; align-items: center; gap: 16px; }
        .status-badge { padding: 8px 16px; border-radius: 30px; font-size: 1.5rem; font-weight: 700; text-transform: uppercase; background: #f1f5f9; }
        .status-ACTIVE { background: #dcfce7; color: #15803d; }
        .status-IDLE { background: #fef9c3; color: #a16207; }
        .status-OFF { background: #fee2e2; color: #b91c1c; }
        .timestamp-label { margin-left: auto; color: #94a3b8; font-size: 0.9rem; }

        .metrics-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 20px; margin-bottom: 24px; }
        .card { background: white; padding: 20px; border-radius: 12px; border: 1px solid #e2e8f0; display: flex; flex-direction: column; }
        .card .label { font-size: 0.8rem; font-weight: 700; text-transform: uppercase; color: #64748b; letter-spacing: 0.5px; margin-bottom: 8px; }
        .card .value { font-size: 2.25rem; font-weight: 700; color: #1e293b; line-height: 1.2; }
        .card .unit { font-size: 1rem; color: #94a3b8; font-weight: 500; margin-left: 4px; }

        .vibration-text { color: #1e40af !important; }
        .current-text { color: #0d9488 !important; }
        .off-text { color: #ef4444 !important; }
        .idle-text { color: #f59e0b !important; }
        .work-text { color: #10b981 !important; }

        .charts-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(500px, 1fr)); gap: 24px; margin-bottom: 24px; }
        .chart-container { background: white; padding: 20px; border-radius: 12px; border: 1px solid #e2e8f0; height: 380px; }

        /* Match website background/theme */
        .log-section { background: #ffffff; color: #334155; padding: 20px; border-radius: 12px; border: 1px solid #e2e8f0; margin-top: 24px; font-family: monospace; }
        .log-header { border-bottom: 1px solid #e2e8f0; padding-bottom: 10px; margin-bottom: 12px; font-size: 0.8rem; font-weight: 700; color: #64748b; text-transform: uppercase; letter-spacing: 0.5px; }
        .log-box { height: 180px; overflow-y: auto; font-size: 0.85rem; line-height: 1.6; display: flex; flex-direction: column; gap: 4px; }
        .log-line { padding-left: 8px; }
        .log-time { color: #94a3b8; margin-right: 8px; }

        /* Exact color coordination matching status cards */
        .log-OFF { border-left: 3px solid #ef4444; color: #b91c1c; font-weight: 600; }
        .log-IDLE { border-left: 3px solid #f59e0b; color: #a16207; font-weight: 600; }
        .log-WORKING { border-left: 3px solid #10b981; color: #15803d; font-weight: 600; }
        .log-system { border-left: 3px solid #3b82f6; color: #475569; }

        @media (max-width: 768px) {
            header { padding: 12px 16px; flex-direction: column; gap: 8px; text-align: center; }
            header h1 { font-size: 1.4rem; }
            .container { padding: 0 12px; margin: 12px auto; }
            .control-panel { flex-direction: column; gap: 12px; align-items: stretch; }
            .status-banner { flex-direction: column; text-align: center; gap: 12px; }
            .status-badge { font-size: 1.2rem; width: 100%; text-align: center; }
            .metrics-grid { grid-template-columns: 1fr; gap: 12px; }
            .charts-grid { grid-template-columns: 1fr; gap: 16px; }
            .chart-container { height: 280px; padding: 12px; }
        }
    </style>
</head>
<body>

    <header>
        <div>
            <h5>Team Tech Titans Presents:</h5>
            <h1>SmartSenseCNC</h1>
            <p style="color:#64748b; font-size:0.9rem;">Real-Time CNC Downtime Monitor</p>
        </div>
        <div class="live-indicator">
            <div class="pulse-dot"></div>
            <span id="live-clock">00:00:00 PM</span>
        </div>
    </header>

    <div class="container">
        <div class="control-panel">
            <div class="control-group">
                <label style="font-weight:700;">MACHINE</label>
                <select id="machine-select" onchange="changeMachine()">
                    <option value="CNC-01">CNC-01</option>
                </select>
            </div>
            <button class="btn-refresh" onclick="updateDashboard()">REFRESH</button>
        </div>

        <div class="status-banner">
            <div style="width:20px; height:20px; border-radius:50%; background:#94a3b8;" id="status-indicator-dot"></div>
            <span class="status-badge" id="status-text">LOADING...</span>
            <span class="timestamp-label" id="last-update">Last: --:--:--</span>
        </div>

        <div class="metrics-grid">
            <div class="card">
                <span class="label">Vibration</span>
                <span class="value vibration-text"><span id="val-vibration">0.000</span><span class="unit">m/s²</span></span>
            </div>
            <div class="card">
                <span class="label">Current</span>
                <span class="value current-text"><span id="val-current">0.000</span><span class="unit">A</span></span>
            </div>
            <div class="card">
                <span class="label">Machine Off</span>
                <span class="value off-text" id="time-off">0 sec</span>
            </div>
            <div class="card">
                <span class="label">Downtime (Idle)</span>
                <span class="value idle-text" id="time-idle">0 sec</span>
            </div>
            <div class="card">
                <span class="label">Active Working</span>
                <span class="value work-text" id="time-work">0 sec</span>
            </div>
        </div>

        <div class="charts-grid">
            <div class="chart-container">
                <canvas id="vibrationChart"></canvas>
            </div>
            <div class="chart-container">
                <canvas id="currentChart"></canvas>
            </div>
        </div>

        <div class="log-section">
            <div class="log-header">Live Server Logs</div>
            <div class="log-box" id="dashboard-logger">
                <div class="log-line log-system"><span class="log-time">[SYSTEM]</span> Channels initialized.</div>
            </div>
        </div>
    </div>

    <script>
        let machineId = "CNC-01";
        let vibChart, curChart;

        function addWebLog(state, current, vibration) {
            const logBox = document.getElementById("dashboard-logger");
            const timeStr = new Date().toLocaleTimeString();
            const logElement = document.createElement("div");
            
            let colorClass = "log-system";
            if (state.includes("WORKING")) colorClass = "log-WORKING";
            else if (state.includes("Idle")) colorClass = "log-IDLE";
            else if (state.includes("OFF")) colorClass = "log-OFF";

            logElement.className = `log-line ${colorClass}`;
            logElement.innerHTML = `<span class="log-time">[${timeStr}]</span> State: ${state} | Current: ${current} A | Vibration: ${vibration} m/s²`;
            
            logBox.appendChild(logElement);
            logBox.scrollTop = logBox.scrollHeight;
        }

        function startClock() {
            setInterval(() => {
                document.getElementById("live-clock").innerText = new Date().toLocaleTimeString();
            }, 1000);
        }

        function initCharts() {
            const ctxVib = document.getElementById('vibrationChart').getContext('2d');
            vibChart = new Chart(ctxVib, {
                type: 'line',
                data: { labels: [], datasets: [{ label: 'Vibration Over Time (m/s²)', data: [], borderColor: '#1e40af', backgroundColor: 'rgba(30, 64, 175, 0.1)', fill: true, tension: 0.3 }] },
                options: { responsive: true, maintainAspectRatio: false, scales: { y: { beginAtZero: true } } }
            });

            const ctxCur = document.getElementById('currentChart').getContext('2d');
            curChart = new Chart(ctxCur, {
                type: 'line',
                data: { labels: [], datasets: [{ label: 'Current Over Time (A)', data: [], borderColor: '#0d9488', backgroundColor: 'rgba(13, 148, 136, 0.1)', fill: true, tension: 0.3 }] },
                options: { responsive: true, maintainAspectRatio: false, scales: { y: { beginAtZero: true } } }
            });
        }

        async function fetchLatest() {
            try {
                const r = await fetch(`/api/latest?machine_id=${machineId}`);
                if (!r.ok) return;
                const d = await r.json();

                const vibStr = Number(d.vibration).toFixed(3);
                const curStr = Number(d.current).toFixed(3);
                const stateText = d.state_model || "UNKNOWN";

                document.getElementById("val-vibration").innerText = vibStr;
                document.getElementById("val-current").innerText = curStr;
                
                const badge = document.getElementById("status-text");
                const dot = document.getElementById("status-indicator-dot");
                
                badge.innerText = stateText;
                badge.className = "status-badge";
                
                if (stateText.includes("WORKING")) {
                    badge.classList.add("status-ACTIVE");
                    dot.style.background = "#10b981";
                } else if (stateText.includes("Idle")) {
                    badge.classList.add("status-IDLE");
                    dot.style.background = "#f59e0b";
                } else {
                    badge.classList.add("status-OFF");
                    dot.style.background = "#ef4444";
                }

                if (d.timestamp) {
                    document.getElementById("last-update").innerText = `Last: ${d.timestamp.split(" ")[1] || d.timestamp}`;
                }

                addWebLog(stateText, curStr, vibStr);
            } catch (err) {}
        }

        async function fetchSummary() {
            try {
                const r = await fetch(`/api/summary?machine_id=${machineId}`);
                const d = await r.json();
                
                const secs = d.seconds || {};
                const off  = secs["MACHINE OFF"] || 0;
                const idle = secs["MACHINE ON (Idle)"] || 0;
                const work = secs["MACHINE ON + WORKING"] || 0;

                document.getElementById("time-off").innerText = `${off} sec`;
                document.getElementById("time-idle").innerText = `${idle} sec`;
                document.getElementById("time-work").innerText = `${work} sec`;
            } catch (err) {}
        }

        async function fetchHistory() {
            try {
                const r = await fetch(`/api/history?machine_id=${machineId}&limit=30`);
                const data = await r.json();

                const labels = data.map(item => item.timestamp ? item.timestamp.split(" ")[1] : "");
                const vibData = data.map(item => item.vibration);
                const curData = data.map(item => item.current);

                vibChart.data.labels = labels;
                vibChart.data.datasets[0].data = vibData;
                vibChart.update();

                curChart.data.labels = labels;
                curChart.data.datasets[0].data = curData;
                curChart.update();
            } catch (err) {}
        }

        function updateDashboard() {
            fetchLatest();
            fetchSummary();
            fetchHistory();
        }

        function changeMachine() {
            machineId = document.getElementById("machine-select").value;
            updateDashboard();
        }

        window.onload = () => {
            startClock();
            initCharts();
            updateDashboard();
            setInterval(updateDashboard, 3000);
        };
    </script>
</body>
</html>
